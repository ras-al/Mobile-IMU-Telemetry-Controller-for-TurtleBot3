<!DOCTYPE html>
<html>

<head>
    <title>TurtleBot3 Telemetry Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .dashboard {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 400px;
        }

        .metric {
            margin-bottom: 20px;
        }

        .bar-container {
            width: 100%;
            background-color: #444;
            border-radius: 5px;
            height: 30px;
            overflow: hidden;
            position: relative;
        }

        .bar {
            height: 100%;
            transition: width 0.1s ease-out;
        }

        .bar.linear {
            background-color: #4CAF50;
            width: 50%;
        }

        /* Starts at center (50%) */
        .bar.angular {
            background-color: #2196F3;
            width: 50%;
        }

        .center-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: white;
            z-index: 10;
        }

        .status {
            color: #ff5252;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <h2>Telemetry Dashboard</h2>
        <div id="connection-status" class="status">Disconnected</div>

        <div class="metric">
            <label>Linear Velocity (Forward/Back): <span id="linear-val">0.00</span></label>
            <div class="bar-container">
                <div class="center-line"></div>
                <div id="linear-bar" class="bar linear"></div>
            </div>
        </div>

        <div class="metric">
            <label>Angular Velocity (Left/Right): <span id="angular-val">0.00</span></label>
            <div class="bar-container">
                <div class="center-line"></div>
                <div id="angular-bar" class="bar angular"></div>
            </div>
        </div>
    </div>

    <script>
        const ros = new ROSLIB.Ros({
            url: 'ws://localhost:9090'
        });

        ros.on('connection', function () {
            document.getElementById('connection-status').innerText = 'Connected to ROS 2';
            document.getElementById('connection-status').style.color = '#4CAF50';
        });

        // Subscribe to the /cmd_vel topic
        const cmdVelListener = new ROSLIB.Topic({
            ros: ros,
            name: '/cmd_vel',
            messageType: 'geometry_msgs/Twist'
        });

        cmdVelListener.subscribe(function (message) {
            const linearX = message.linear.x;
            const angularZ = message.angular.z;

            document.getElementById('linear-val').innerText = linearX.toFixed(2);
            document.getElementById('angular-val').innerText = angularZ.toFixed(2);

            const linearPercentage = Math.min(Math.max((linearX + 1.0) * 50, 0), 100);
            const angularPercentage = Math.min(Math.max((angularZ + 1.0) * 50, 0), 100);

            document.getElementById('linear-bar').style.width = linearPercentage + '%';
            document.getElementById('angular-bar').style.width = angularPercentage + '%';
        });
    </script>
</body>

</html>
